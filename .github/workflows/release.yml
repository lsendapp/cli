# Build & Release lsend binaries for all platforms.
#
# Triggers:
#   - push tag matching 'v*'        → publish GitHub Release for that tag
#   - workflow_dispatch (manual)    → publish using ${{ github.ref_name }}
#                                     (defaults to "dispatch-<sha>" if not a tag)
#
# Required secrets: none.
# Optional env (used by release body only): none.

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            bin: lsend
          # Apple Intel
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            bin: lsend
          # Linux x86_64 (musl — static binary via Zig cross-compile)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            bin: lsend
          # Linux arm64 (musl — static binary via Zig cross-compile)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            archive: tar.gz
            bin: lsend
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
            bin: lsend.exe
          # Windows arm64
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            archive: zip
            bin: lsend.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

          # Linux uses cargo-zigbuild so `ring` (which needs a C cross-compiler)
          # can target musl without installing musl-tools or zig manually.
          # macOS and Windows build natively with cargo (no cross-compile needed).
      - name: Install Zig (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            vendor/localsend-core -> target

      - name: Build (release, stripped) — Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cargo zigbuild --release --target ${{ matrix.target }} --locked
        env:
          # Strip debug info, enable LTO, single codegen unit → smaller binary.
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      - name: Build (release, stripped) — macOS/Windows
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          # Strip debug info, enable LTO, single codegen unit → smaller binary.
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="lsend-${{ matrix.target }}"
          mkdir -p "$ARTIFACT"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$ARTIFACT/"
          cp README.md "$ARTIFACT/" 2>/dev/null || true
          cp LICENSE "$ARTIFACT/" 2>/dev/null || true
          tar -C "$ARTIFACT" -czf "$ARTIFACT.tar.gz" .
          ls -lh "$ARTIFACT.tar.gz"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = "lsend-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $artifact -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" -Destination $artifact
          if (Test-Path README.md) { Copy-Item README.md -Destination $artifact }
          if (Test-Path LICENSE)  { Copy-Item LICENSE  -Destination $artifact }
          Compress-Archive -Path "$artifact/*" -DestinationPath "$artifact.zip"
          Get-ChildItem "$artifact.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsend-${{ matrix.target }}
          path: lsend-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*
          fail_on_unmatched_files: true
          body: |
            ## Installation

            Download the archive for your platform below, extract it, and put
            `lsend` on your `PATH`.

            ### Quick install (macOS / Linux)

            ```bash
            # Pick the URL matching your arch + OS, or use the one-liner below.
            curl -L https://github.com/lsendapp/cli/releases/latest/download/lsend-$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')-$(uname -s | tr A-Z a-z | sed 's/darwin/apple-darwin/;s/linux/unknown-linux-musl/').tar.gz \
              | tar xz
            sudo mv lsend /usr/local/bin/
            ```

            ### Windows

            Download `lsend-x86_64-pc-windows-msvc.zip` (or `-aarch64-`),
            extract, and add the folder to your `PATH`.

            ### From source

            ```bash
            cargo install lsend-cli --locked
            ```

            ## Verify

            Compare the archive's SHA-256 against `SHA256SUMS` in this release.

            ```bash
            sha256sum -c SHA256SUMS
            ```

            See the [README](https://github.com/lsendapp/cli#readme) and
            [`skills/localsend-cli/SKILL.md`](https://github.com/lsendapp/cli/blob/main/skills/localsend-cli/SKILL.md)
            for usage.