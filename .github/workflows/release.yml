# Build & Release lsend binaries for all platforms.
#
# Triggers:
#   - push tag matching 'v*'        → publish GitHub Release for that tag
#   - workflow_dispatch (manual)    → publish using ${{ github.ref_name }}
#
# Required secrets: none.
# Optional secrets (macOS signing + notarization — workflow runs without them,
# but unsigned binaries will trigger Gatekeeper warnings on first use):
#   APPLE_CERTIFICATE              Base64-encoded .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD     .p12 password
#   APPLE_TEAM_ID                  10-char Apple Developer Team ID
#   APPLE_API_KEY_CONTENT          Base64-encoded .p8 (App Store Connect API key)
#   APPLE_API_KEY                  API Key ID (10 chars)
#   APPLE_API_ISSUER               API Issuer ID (UUID)

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
        # Apple silicon
        - target: aarch64-apple-darwin
          os: macos-14
          archive: tar.gz
          bin: lsend
        # Apple Intel
        - target: x86_64-apple-darwin
          os: macos-14
          archive: tar.gz
          bin: lsend
        # Linux x86_64 (musl — static binary via Zig cross-compile)
        - target: x86_64-unknown-linux-musl
          os: ubuntu-22.04
          archive: tar.gz
          bin: lsend
        # Linux arm64 (musl — static binary via Zig cross-compile)
        - target: aarch64-unknown-linux-musl
          os: ubuntu-22.04
          archive: tar.gz
          bin: lsend
        # Windows x86_64
        - target: x86_64-pc-windows-msvc
          os: windows-2022
          archive: zip
          bin: lsend.exe
        # Windows arm64
        - target: aarch64-pc-windows-msvc
          os: windows-2022
          archive: zip
          bin: lsend.exe

    env:
      # Detect optional Apple secrets. HAS_APPLE_CERTIFICATE / HAS_APPLE_API_KEY
      # gate the signing + notarization steps below. The workflow runs without
      # these secrets — macOS binaries will simply be unsigned (Gatekeeper warns).
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_CONTENT != '' && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (Linux only)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            vendor/localsend-core -> target

      - name: Build (release, stripped) — Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cargo zigbuild --release --target ${{ matrix.target }} --locked
        env:
          # Strip debug info, enable LTO, single codegen unit → smaller binary.
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      - name: Build (release, stripped) — macOS/Windows
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --locked
        env:
          # Strip debug info, enable LTO, single codegen unit → smaller binary.
          CARGO_PROFILE_RELEASE_STRIP: symbols
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1


      # macOS code signing + notarization. Optional — workflow runs without
      # these secrets, but unsigned binaries will trigger Gatekeeper warnings.
      #
      # apple-actions/import-codesign-certs@v2 already:
      #   - creates the `signing_temp.keychain` keychain
      #   - unlocks it (with an auto-generated password)
      #   - imports the P12 + sets the apple-tool/apple partition list (so
      #     /usr/bin/codesign can use the private key without a passphrase prompt)
      #   - adds signing_temp.keychain to the user keychain search list
      # So no manual keychain manipulation is needed below — we only run a
      # sanity check to fail fast if the identity isn't visible to codesign.
      - name: Import signing certificate (macOS)
        id: import-codesign-certs
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify signing identity is visible to codesign (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        run: |
          set -euo pipefail
          # `codesigning` is the supported `find-identity` policy; it lists
          # all code-signing identities (Developer ID Application, Apple
          # Development, etc.). The grep confirms a Developer ID Application
          # identity — the only kind suitable for distribution signing.
          if ! security find-identity -p codesigning -v \
               | grep -q '"Developer ID Application:'; then
            echo "::error::No Developer ID Application identity in keychain."
            echo "This usually means the APPLE_CERTIFICATE secret is wrong --"
            echo "e.g. the .p12 contains a private key without its certificate,"
            echo "or the cert is expired/not a Developer ID Application cert."
            echo "--- find-identity -p codesigning -v (whole search list) ---"
            security find-identity -p codesigning -v 2>&1 || true
            echo "--- find-certificate -a over signing_temp.keychain ---"
            security find-certificate -a signing_temp.keychain 2>&1 || true
            exit 1
          fi
          security find-identity -p codesigning -v

      - name: Codesign binary (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERTIFICATE == 'true'
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          # codesign's --sign takes an identity name in the form
          # "Developer ID Application: <TEAM NAME> (TEAMID)". find-identity
          # wraps the displayed name in double quotes; we strip those quotes
          # so codesign gets the bare name and can match it against the
          # keychain identity.
          IDENTITY=$(security find-identity -p codesigning -v \
            | grep -o '"Developer ID Application: [^"]*"' \
            | head -n1 \
            | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            exit 1
          fi
          echo "Using identity: $IDENTITY"
          codesign --force --deep \
            --sign "$IDENTITY" \
            --options runtime --timestamp \
            "$BIN"
          codesign --verify --verbose=2 "$BIN"

      - name: Setup notarization API key (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_API_KEY == 'true'
        run: echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 -d > api_key.p8

      - name: Notarize binary (macOS)
        if: runner.os == 'macOS' && env.HAS_APPLE_API_KEY == 'true'
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          # notarytool needs the binary in a zip (not the raw Mach-O).
          ditto -c -k --sequesterRsrc --keepParent "$BIN" "${BIN}.zip"
          xcrun notarytool submit "${BIN}.zip" \
            --key api_key.p8 \
            --key-id "${{ secrets.APPLE_API_KEY }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}" \
            --wait
          rm -f "${BIN}.zip"
          # Note: `xcrun stapler staple` only works for .app bundles, .dmg,
          # .pkg, and .zip containers -- NOT bare Mach-O executables. We
          # distribute `lsend` as a raw binary inside a tar.gz, so stapling
          # is not applicable. The notarization record on Apple's servers
          # (status: Accepted above) is what Gatekeeper checks at runtime
          # via the binary's cdhash, with no staple ticket needed.

      - name: Cleanup API key (macOS)
        if: always() && runner.os == 'macOS'
        run: rm -f api_key.p8
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="lsend-${{ matrix.target }}"
          mkdir -p "$ARTIFACT"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$ARTIFACT/"
          cp README.md "$ARTIFACT/" 2>/dev/null || true
          cp LICENSE "$ARTIFACT/" 2>/dev/null || true
          tar -C "$ARTIFACT" -czf "$ARTIFACT.tar.gz" .
          ls -lh "$ARTIFACT.tar.gz"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $artifact = "lsend-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $artifact -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" -Destination $artifact
          if (Test-Path README.md) { Copy-Item README.md -Destination $artifact }
          if (Test-Path LICENSE)  { Copy-Item LICENSE  -Destination $artifact }
          Compress-Archive -Path "$artifact/*" -DestinationPath "$artifact.zip"
          Get-ChildItem "$artifact.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsend-${{ matrix.target }}
          path: lsend-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/*
          fail_on_unmatched_files: true
          body: |
            ## Installation

            Download the archive for your platform below, extract it, and put
            `lsend` on your `PATH`.

            ### Quick install (macOS / Linux)

            ```bash
            # Pick the URL matching your arch + OS, or use the one-liner below.
            curl -L https://github.com/lsendapp/cli/releases/latest/download/lsend-$(uname -m | sed 's/x86_64/x86_64/;s/aarch64/aarch64/')-$(uname -s | tr A-Z a-z | sed 's/darwin/apple-darwin/;s/linux/unknown-linux-musl/').tar.gz \
              | tar xz
            sudo mv lsend /usr/local/bin/
            ```

            ### Windows

            Download `lsend-x86_64-pc-windows-msvc.zip` (or `-aarch64-`),
            extract, and add the folder to your `PATH`.

            ### From source

            ```bash
            cargo install lsend-cli --locked
            ```

            ## Verify

            Compare the archive's SHA-256 against `SHA256SUMS` in this release.

            ```bash
            sha256sum -c SHA256SUMS
            ```

            See the [README](https://github.com/lsendapp/cli#readme) and
            [`skills/localsend-cli/SKILL.md`](https://github.com/lsendapp/cli/blob/main/skills/localsend-cli/SKILL.md)
            for usage.